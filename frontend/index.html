<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kashf — RTA Operations Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <!-- Mapbox PUBLIC token embedded for the GitHub Pages build (config.js is gitignored /
       not deployed). Must run before all other scripts so window.KASHF_CONFIG exists;
       a local js/config.js, if present, harmlessly overrides this for local dev. -->
  <script>
    window.KASHF_CONFIG = {
      mapboxToken: "pk.eyJ1IjoibWFyd2FuNjciLCJhIjoiY21yN2d5bm1xMG5qZjJ5czlibzBsc3R0aCJ9.weDrfX_0q4lz3p_sgbSUfA"
    };
  </script>
</head>
<body>
  <!-- Contract-validation failures surface here (never a silent blank). -->
  <div id="error-banner" class="error-banner" hidden></div>

  <header class="topbar">
    <div class="brand">
      <span class="wordmark">Kashf</span>
      <span class="subtitle">Root-cause diagnosis &amp; scenario testing — RTA challenge demo</span>
    </div>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Scenarios"></nav>
    <div class="topbar-right">
      <button id="traffic-toggle" class="traffic-toggle" type="button" aria-pressed="true"
              title="Toggle Mapbox live traffic base layer" hidden>
        <span class="tt-dot"></span> Live traffic
      </button>
      <span class="clock" id="clock" aria-label="Current time">--:--:--</span>
      <span class="status-pill" id="status-pill"></span>
    </div>
  </header>

  <main class="stage">
    <div class="map-zone">
      <div id="map"></div>
      <!-- Case-3 only: rain streaks over the map, pointer-events none. -->
      <div id="rain-overlay" class="rain-overlay" hidden aria-hidden="true"></div>
      <!-- Route-fallback / schematic-line note. -->
      <div id="map-note" class="map-note" hidden></div>
      <!-- Shown only if the Mapbox token is missing/placeholder. -->
      <div id="map-token-warning" class="map-token-warning" hidden></div>
    </div>
    <aside class="panel" id="panel" aria-live="polite"></aside>
  </main>

  <footer class="bottom-strip">
    <span id="bottom-strip"></span>
    <span id="traffic-disclosure" class="traffic-disclosure"></span>
  </footer>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.2.0/turf.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
